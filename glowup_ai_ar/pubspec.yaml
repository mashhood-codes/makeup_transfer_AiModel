  share_plus: ^7.2.0
  intl: ^0.19.0
  http: ^1.6.0
  camera: ^0.12.0+1
  google_mlkit_face_detection: ^0.13.2
  shared_preferences: ^2.5.5
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

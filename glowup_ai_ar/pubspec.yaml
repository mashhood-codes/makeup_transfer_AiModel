name: glowup_ai_ar
description: Professional AI Makeup Transfer App.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.0.0
  image: ^4.1.0
  permission_handler: ^11.4.0
  dio: ^5.3.0
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.0
  lottie: ^2.7.0
